{% extends "base.html" %}
{% set is_edit = website and website.id %}
{% block title %}{% if is_edit %}Edit Website{% else %}New Website{% endif %} · Website CMS{% endblock %}
{% block content %}
<article class="card form-card">
  <h2>{% if is_edit %}Edit Website{% else %}Add Website{% endif %}</h2>
  <form method="post">
    <label>
      Name
      <input type="text" name="name" value="{{ website.name if website else '' }}" required />
    </label>

    <label>
      Domain
      <input type="text" name="domain" placeholder="example.com" value="{{ website.domain if website else '' }}" required />
    </label>

    <label>
      Tech Stack
      <input type="text" name="tech_stack" placeholder="Next.js, WordPress, Hugo..." value="{{ website.tech_stack if website else '' }}" />
    </label>

    <label>
      Status
      <select name="status">
        {% set current_status = website.status if website and website.status else 'active' %}
        <option value="active" {% if current_status == 'active' %}selected{% endif %}>active</option>
        <option value="maintenance" {% if current_status == 'maintenance' %}selected{% endif %}>maintenance</option>
        <option value="archived" {% if current_status == 'archived' %}selected{% endif %}>archived</option>
      </select>
    </label>

    <div class="actions">
      <button type="submit">Save Website</button>
      <a class="button secondary" href="{{ url_for('dashboard') }}">Cancel</a>
    </div>
  </form>
</article>
{% endblock %}

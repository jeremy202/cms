{% extends "base.html" %}
{% set is_edit = page and page.id %}
{% block title %}{% if is_edit %}Edit Page{% else %}New Page{% endif %} · {{ website.name }}{% endblock %}
{% block content %}
<article class="card form-card">
  <h2>{% if is_edit %}Edit{% else %}Add{% endif %} page for {{ website.name }}</h2>
  <form method="post">
    <label>
      Title
      <input type="text" name="title" value="{{ page.title if page else '' }}" required />
    </label>

    <label>
      Slug
      <input type="text" name="slug" placeholder="about-us" value="{{ page.slug if page else '' }}" required />
    </label>

    <label>
      SEO Description
      <textarea name="seo_description" rows="4">{{ page.seo_description if page else '' }}</textarea>
    </label>

    <label class="inline">
      <input type="checkbox" name="published" {% if page and page.published %}checked{% endif %} />
      Published
    </label>

    <div class="actions">
      <button type="submit">Save Page</button>
      <a class="button secondary" href="{{ url_for('pages_for_website', website_id=website.id) }}">Cancel</a>
    </div>
  </form>
</article>
{% endblock %}

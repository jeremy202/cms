{% extends "base.html" %}
{% block title %}{{ page.title }} · {{ website.name }}{% endblock %}
{% block content %}
<article class="card">
  <div class="row between">
    <div>
      <h2>{{ page.title }}</h2>
      <p class="muted">/{{ page.slug }} · {{ 'published' if page.published else 'draft' }}</p>
    </div>
    <div class="actions">
      <a class="button" href="{{ url_for('edit_page_form', page_id=page.id) }}">Edit</a>
      <a class="button secondary" href="{{ url_for('pages_for_website', website_id=website.id) }}">Back</a>
    </div>
  </div>

  <section class="markdown-preview">
    {{ rendered_content | safe }}
  </section>
</article>
{% endblock %}

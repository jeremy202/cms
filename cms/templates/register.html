{% extends "base.html" %}
{% block title %}Register · Website CMS{% endblock %}
{% block content %}
<article class="card form-card">
  <h2>Create account</h2>
  <form method="post">
    <label>
      Username
      <input type="text" name="username" minlength="3" required />
    </label>

    <label>
      Password
      <input type="password" name="password" minlength="8" required />
    </label>

    <label>
      Role
      <select name="role">
        <option value="editor">editor</option>
        <option value="admin">admin</option>
      </select>
    </label>

    <div class="actions">
      <button type="submit">Register</button>
      <a class="button secondary" href="{{ url_for('login') }}">Back to login</a>
    </div>
  </form>
</article>
{% endblock %}

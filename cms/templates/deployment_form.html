{% extends "base.html" %}
{% block title %}Edit Deployment · {{ website.name }}{% endblock %}
{% block content %}
<article class="card form-card">
  <h2>Edit deployment for {{ website.name }}</h2>
  <form method="post">
    <label>
      Provider
      <select name="provider">
        <option value="vercel" {% if deployment.provider == 'vercel' %}selected{% endif %}>vercel</option>
        <option value="netlify" {% if deployment.provider == 'netlify' %}selected{% endif %}>netlify</option>
      </select>
    </label>

    <label>
      Project name
      <input type="text" name="project_name" value="{{ deployment.project_name if deployment else '' }}" required />
    </label>

    <label>
      Production URL
      <input type="text" name="production_url" value="{{ deployment.production_url if deployment else '' }}" />
    </label>

    <label>
      Preview URL
      <input type="text" name="preview_url" value="{{ deployment.preview_url if deployment else '' }}" />
    </label>

    <label>
      Branch
      <input type="text" name="branch" value="{{ deployment.branch if deployment else '' }}" />
    </label>

    <label>
      Status
      <select name="status">
        {% set current_status = deployment.status if deployment and deployment.status else 'active' %}
        <option value="active" {% if current_status == 'active' %}selected{% endif %}>active</option>
        <option value="paused" {% if current_status == 'paused' %}selected{% endif %}>paused</option>
        <option value="error" {% if current_status == 'error' %}selected{% endif %}>error</option>
      </select>
    </label>

    <div class="actions">
      <button type="submit">Save deployment</button>
      <a class="button secondary" href="{{ url_for('deployments_for_website', website_id=website.id) }}">Cancel</a>
    </div>
  </form>
</article>
{% endblock %}

{% extends "base.html" %}
{% block title %}Login · Website CMS{% endblock %}
{% block content %}
<article class="card form-card">
  <h2>Login</h2>
  <form method="post">
    <label>
      Username
      <input type="text" name="username" required />
    </label>

    <label>
      Password
      <input type="password" name="password" required />
    </label>

    <div class="actions">
      <button type="submit">Login</button>
      <a class="button secondary" href="{{ url_for('register') }}">Create account</a>
    </div>
  </form>
</article>
{% endblock %}
